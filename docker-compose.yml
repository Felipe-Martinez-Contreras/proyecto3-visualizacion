# Orquestación de los servicios del proyecto.
# Ambos servicios comparten la misma imagen (Dockerfile) y montan el repo como
# volumen, de modo que comparten el MISMO archivo SQLite (db/monitoreo.sqlite).

services:
  # Ingesta continua: APIs externas + tráfico simulado -> BD.
  simulador:
    build: .
    command: python -m ingesta.scheduler
    env_file: .env
    environment:
      # Hora de Chile dentro del contenedor (la base python:3.12-slim ya trae
      # tzdata): así los timestamps quedan alineados con las corridas locales.
      TZ: America/Santiago
      # Sin buffering de stdout: los logs del scheduler se ven en vivo
      # (docker compose logs -f / lazydocker).
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/app
    restart: unless-stopped

  # Dashboard Dash + Plotly.
  dashboard:
    build: .
    command: python -m dashboard.app
    env_file: .env
    environment:
      TZ: America/Santiago  # misma zona horaria que el simulador (ver arriba).
      PYTHONUNBUFFERED: "1"
    ports:
      - "8050:8050"
    volumes:
      - .:/app
    depends_on:
      - simulador
    restart: unless-stopped
